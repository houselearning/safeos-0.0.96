set default=1
set timeout=0

set gfxmode=1024x768x32
set gfxpayload=keep
insmod gfxterm
insmod vbe
insmod vga
insmod all_video
insmod date
insmod datetime

terminal_output gfxterm

menuentry "SafeOS 1.0 (Normal Mode)" {
    echo "Booting SafeOS 1.0..."
    echo "Current date/time:"
    date
    multiboot /SafeOS.bin
    boot
}

menuentry "SafeOS 1.0 (Debug Mode, Serial Console)" {
    insmod serial
    serial --unit=0 --speed=115200 --word=8 --parity=no --stop=1
    terminal_output serial
    echo "Booting SafeOS 1.0 in debug mode..."
    multiboot /SafeOS.bin debug=1
    boot
}

menuentry "SafeOS 1.0 (VESA Fallback 800x600)" {
    set gfxpayload=800x600x32
    echo "Booting SafeOS 1.0 with 800x600 framebuffer..."
    multiboot /SafeOS.bin
    boot
}

menuentry "System information" {
    echo "SafeOS 1.0 - Boot Environment"
    echo "------------------------------"
    echo "Current date/time:"
    date
    echo
    echo "Available video modes:"
    vbeinfo
    echo
    echo "Press ESC to return to the menu."
    sleep --interruptible 10
}

if [ ${timeout} -gt 0 ]; then
    echo "Auto-booting SafeOS 1.0 in ${timeout} seconds..."
fi
